name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  pages: write
  id-token: write

jobs:
  check:
    uses: ./.github/workflows/_check.yml

  release:
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/_release.yml
    secrets: inherit

  docs:
    needs: release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/_docs.yml
    secrets: inherit
